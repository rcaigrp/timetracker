<!DOCTYPE html>
<html>
<head>
    <title>Settings - TimeTracker</title>
</head>
<body>
    <h1>Settings</h1>
    
    <form id="settings-form" action="/settings" method="post">
        <div>
            <label for="jira_base_url">Jira Base URL:</label>
            <input type="url" id="jira_base_url" name="jira_base_url" required>
        </div>
        
        <div>
            <label for="jira_username">Jira Username:</label>
            <input type="text" id="jira_username" name="jira_username" required>
        </div>
        
        <div>
            <label for="jira_api_key">Jira API Key:</label>
            <input type="password" id="jira_api_key" name="jira_api_key" required>
        </div>
        
        <button type="submit">Save Settings</button>
    </form>
    
    <script>
        document.getElementById('settings-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('/settings', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                alert('Settings saved successfully!');
            });
        });
    </script>
</body>
</html>
