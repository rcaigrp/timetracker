<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>LocalTrack</h1>
    
    <!-- Timer Section -->
    <section class="timer-section">
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <div class="timer-controls">
        <button id="startBtn">Start</button>
        <button id="pauseBtn">Pause</button>
        <button id="stopBtn">Stop</button>
      </div>
    </section>

    <!-- Manual Entry Section -->
    <section class="manual-entry-section">
      <h2>Manual Entry</h2>
      <form id="entryForm">
        <input type="text" id="projectName" placeholder="Project Name" required>
        <input type="date" id="entryDate" required>
        <div class="duration-inputs">
          <input type="number" id="hours" placeholder="Hours" min="0" max="23">
          <input type="number" id="minutes" placeholder="Minutes" min="0" max="59">
        </div>
        <textarea id="notes" placeholder="Notes (optional)"></textarea>
        <button type="submit">Add Entry</button>
      </form>
    </section>

    <!-- Summary Section -->
    <section class="summary-section">
      <h2>Today's Summary</h2>
      <div class="summary-display" id="summaryDisplay">0 hours 0 minutes</div>
    </section>

    <!-- Recent Entries Section -->
    <section class="entries-section">
      <h2>Recent Entries</h2>
      <div class="filter-controls">
        <button id="clearBtn">Clear All</button>
        <button id="exportBtn">Export Data</button>
      </div>
      <ul id="entriesList"></ul>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
