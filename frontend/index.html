<!DOCTYPE html>
<html>
<head>
    <title>Jira Time Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .timer { font-size: 2rem; margin: 10px 0; font-family: monospace; }
        .entry-list { margin-top: 20px; }
        .entry { border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        function App() {
            const [time, setTime] = useState(0);
            const [active, setActive] = useState(false);
            const [entries, setEntries] = useState([]);
            const [projects, setProjects] = useState([]);
            
            useEffect(() => {
                let interval;
                if (active) {
                    interval = setInterval(() => setTime(t => t + 1), 1000);
                }
                return () => clearInterval(interval);
            }, [active]);
            
            const toggleTimer = () => {
                setActive(!active);
                if (!active) {
                    fetch('http://127.0.0.1:5000/api/entries', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({description: 'Manual Entry', duration: time, project: 'Web'})
                    }).then(() => {
                        fetch('http://127.0.0.1:5000/api/entries').then(res => res.json()).then(data => setEntries(data));
                    });
                }
            };
            
            useEffect(() => {
                fetch('http://127.0.0.1:5000/api/entries').then(res => res.json()).then(data => setEntries(data));
                fetch('http://127.0.0.1:5000/api/projects').then(res => res.json()).then(data => setProjects(data));
            }, []);

            return (
                <div className="container">
                    <h1>Time Tracker</h1>
                    <div className="timer">{Math.floor(time / 60)}:{(time % 60).toString().padStart(2, '0')}</div>
                    <button onClick={toggleTimer}>{active ? 'Stop' : 'Start'}</button>
                    <div className="entry-list">
                        <h3>Entries</h3>
                        {entries.map((entry, i) => (
                            <div key={i} className="entry">
                                <strong>{entry.description}</strong> - {entry.duration}s
                            </div>
                        ))}
                    </div>
                    <div className="entry-list">
                        <h3>Projects (from Jira)</h3>
                        {projects.map((project, i) => (
                            <div key={i} className="entry">
                                {project.name || project.id}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
