client:
  name: basic
tools: {}
targets:
  "PackageStructure": ["<PackageStructure>"]
  "TimeTrackerApp-debug.exe": ["<TimeTrackerApp-debug.exe>"]
  "TimeTrackerApp-debug.module": ["<TimeTrackerApp-debug.module>"]
  "TimeTrackerLib-debug.module": ["<TimeTrackerLib-debug.module>"]
  "main": ["<TimeTrackerApp-debug.exe>","<TimeTrackerApp-debug.module>","<TimeTrackerLib-debug.module>"]
  "test": ["<TimeTrackerApp-debug.exe>","<TimeTrackerApp-debug.module>","<TimeTrackerLib-debug.module>"]
default: "main"
nodes:
  "/workspace/projects/TimeTracker/Sources/TimeTrackerApp/":
    is-directory-structure: true
    content-exclusion-patterns: [".git",".build"]
  "/workspace/projects/TimeTracker/Sources/TimeTrackerLib/":
    is-directory-structure: true
    content-exclusion-patterns: [".git",".build"]
commands:
  "/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.build/TimeTrackerApp.swiftmodule.o":
    tool: shell
    inputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.swiftmodule"]
    outputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.build/TimeTrackerApp.swiftmodule.o"]
    description: "Wrapping AST for TimeTrackerApp for debugging"
    args: ["/usr/bin/swiftc","-modulewrap","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.swiftmodule","-o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.build/TimeTrackerApp.swiftmodule.o","-target","x86_64-unknown-linux-gnu"]

  "/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/TimeTrackerLib.swiftmodule.o":
    tool: shell
    inputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.swiftmodule"]
    outputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/TimeTrackerLib.swiftmodule.o"]
    description: "Wrapping AST for TimeTrackerLib for debugging"
    args: ["/usr/bin/swiftc","-modulewrap","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.swiftmodule","-o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/TimeTrackerLib.swiftmodule.o","-target","x86_64-unknown-linux-gnu"]

  "<TimeTrackerApp-debug.exe>":
    tool: phony
    inputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp"]
    outputs: ["<TimeTrackerApp-debug.exe>"]

  "<TimeTrackerApp-debug.module>":
    tool: phony
    inputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.build/main.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.swiftmodule"]
    outputs: ["<TimeTrackerApp-debug.module>"]

  "<TimeTrackerLib-debug.module>":
    tool: phony
    inputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/Project.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/TaskManager.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/TimeTrackerLib.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.swiftmodule"]
    outputs: ["<TimeTrackerLib-debug.module>"]

  "C.TimeTrackerApp-debug.exe":
    tool: shell
    inputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.build/TimeTrackerApp.swiftmodule.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.build/main.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/Project.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/TaskManager.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/TimeTrackerLib.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/TimeTrackerLib.swiftmodule.o"]
    outputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp"]
    description: "Linking ./.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp"
    args: ["/usr/bin/swiftc","-L","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug","-o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp","-module-name","TimeTrackerApp","-emit-executable","-Xlinker","--defsym","-Xlinker","main=TimeTrackerApp_main","-Xlinker","-rpath=$ORIGIN","@/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.product/Objects.LinkFileList","-target","x86_64-unknown-linux-gnu","-L","/usr/lib"]

  "C.TimeTrackerApp-debug.module":
    tool: swift-compiler
    inputs: ["/workspace/projects/TimeTracker/Sources/TimeTrackerApp/main.swift","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.swiftmodule"]
    outputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.build/main.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.swiftmodule"]
    executable: "/usr/bin/swiftc"
    module-name: "TimeTrackerApp"
    module-output-path: "/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.swiftmodule"
    import-paths: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug"]
    temps-path: "/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.build"
    objects: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerApp.build/main.swift.o"]
    other-args: ["-target","x86_64-unknown-linux-gnu","-swift-version","5","-enable-batch-mode","-index-store-path","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/index/store","-Onone","-enable-testing","-g","-j4","-DSWIFT_PACKAGE","-DDEBUG","-module-cache-path","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/ModuleCache","-parseable-output","-Xfrontend","-entry-point-function-name","-Xfrontend","TimeTrackerApp_main"]
    sources: ["/workspace/projects/TimeTracker/Sources/TimeTrackerApp/main.swift"]
    is-library: false
    enable-whole-module-optimization: false
    num-threads: 4

  "C.TimeTrackerLib-debug.module":
    tool: swift-compiler
    inputs: ["/workspace/projects/TimeTracker/Sources/TimeTrackerLib/Project.swift","/workspace/projects/TimeTracker/Sources/TimeTrackerLib/TaskManager.swift","/workspace/projects/TimeTracker/Sources/TimeTrackerLib/TimeTrackerLib.swift"]
    outputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/Project.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/TaskManager.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/TimeTrackerLib.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.swiftmodule"]
    executable: "/usr/bin/swiftc"
    module-name: "TimeTrackerLib"
    module-output-path: "/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.swiftmodule"
    import-paths: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug"]
    temps-path: "/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build"
    objects: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/Project.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/TaskManager.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTrackerLib.build/TimeTrackerLib.swift.o"]
    other-args: ["-target","x86_64-unknown-linux-gnu","-swift-version","5","-enable-batch-mode","-index-store-path","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/index/store","-Onone","-enable-testing","-g","-j4","-DSWIFT_PACKAGE","-DDEBUG","-module-cache-path","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/ModuleCache","-parseable-output","-parse-as-library"]
    sources: ["/workspace/projects/TimeTracker/Sources/TimeTrackerLib/Project.swift","/workspace/projects/TimeTracker/Sources/TimeTrackerLib/TaskManager.swift","/workspace/projects/TimeTracker/Sources/TimeTrackerLib/TimeTrackerLib.swift"]
    is-library: true
    enable-whole-module-optimization: false
    num-threads: 4

  "PackageStructure":
    tool: package-structure-tool
    inputs: ["/workspace/projects/TimeTracker/Sources/TimeTrackerApp/","/workspace/projects/TimeTracker/Sources/TimeTrackerLib/","/workspace/projects/TimeTracker/Package.swift","/workspace/projects/TimeTracker/Package.resolved"]
    outputs: ["<PackageStructure>"]
    description: "Planning build"
    allow-missing-inputs: true

