client:
  name: basic
tools: {}
targets:
  "PackageStructure": ["<PackageStructure>"]
  "TimeTracker-debug.module": ["<TimeTracker-debug.module>"]
  "main": ["<TimeTracker-debug.module>"]
  "test": ["<TimeTracker-debug.module>"]
default: "main"
nodes:
  "/workspace/projects/TimeTracker/Sources/TimeTracker/":
    is-directory-structure: true
    content-exclusion-patterns: [".git",".build"]
commands:
  "/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build/TimeTracker.swiftmodule.o":
    tool: shell
    inputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.swiftmodule"]
    outputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build/TimeTracker.swiftmodule.o"]
    description: "Wrapping AST for TimeTracker for debugging"
    args: ["/usr/bin/swiftc","-modulewrap","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.swiftmodule","-o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build/TimeTracker.swiftmodule.o","-target","x86_64-unknown-linux-gnu"]

  "<TimeTracker-debug.module>":
    tool: phony
    inputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build/App.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build/DashboardView.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build/TimerService.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.swiftmodule"]
    outputs: ["<TimeTracker-debug.module>"]

  "C.TimeTracker-debug.module":
    tool: swift-compiler
    inputs: ["/workspace/projects/TimeTracker/Sources/TimeTracker/App.swift","/workspace/projects/TimeTracker/Sources/TimeTracker/DashboardView.swift","/workspace/projects/TimeTracker/Sources/TimeTracker/TimerService.swift"]
    outputs: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build/App.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build/DashboardView.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build/TimerService.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.swiftmodule"]
    executable: "/usr/bin/swiftc"
    module-name: "TimeTracker"
    module-output-path: "/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.swiftmodule"
    import-paths: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug"]
    temps-path: "/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build"
    objects: ["/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build/App.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build/DashboardView.swift.o","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/TimeTracker.build/TimerService.swift.o"]
    other-args: ["-target","x86_64-unknown-linux-gnu","-swift-version","5","-enable-batch-mode","-index-store-path","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/index/store","-Onone","-enable-testing","-g","-j4","-DSWIFT_PACKAGE","-DDEBUG","-module-cache-path","/workspace/projects/TimeTracker/.build/x86_64-unknown-linux-gnu/debug/ModuleCache","-parseable-output","-parse-as-library","-Xcc","-fPIC","-package-name","timetracker","-Xcc","-fno-omit-frame-pointer"]
    sources: ["/workspace/projects/TimeTracker/Sources/TimeTracker/App.swift","/workspace/projects/TimeTracker/Sources/TimeTracker/DashboardView.swift","/workspace/projects/TimeTracker/Sources/TimeTracker/TimerService.swift"]
    is-library: true
    enable-whole-module-optimization: false
    num-threads: 4

  "PackageStructure":
    tool: package-structure-tool
    inputs: ["/workspace/projects/TimeTracker/Sources/TimeTracker/","/workspace/projects/TimeTracker/Package.swift","/workspace/projects/TimeTracker/Package.resolved"]
    outputs: ["<PackageStructure>"]
    description: "Planning build"
    allow-missing-inputs: true

